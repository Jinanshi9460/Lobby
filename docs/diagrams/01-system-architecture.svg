<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <style>
      .title { fill: #f8fafc; font-size: 22px; font-weight: 700; }
      .label { fill: #e2e8f0; font-size: 13px; font-weight: 600; }
      .sub { fill: #94a3b8; font-size: 11px; }
      .box { fill: #1e293b; stroke: #38bdf8; stroke-width: 1.5; rx: 10; }
      .box-ext { fill: #172554; stroke: #22d3ee; stroke-width: 1.5; rx: 10; }
      .box-fe { fill: #134e4a; stroke: #2dd4bf; stroke-width: 1.5; rx: 10; }
      .arrow { stroke: #67e8f9; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#67e8f9"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="url(#bg)"/>
  <text x="460" y="36" text-anchor="middle" class="title">LOBBy  System Architecture</text>

  <rect x="40" y="70" width="200" height="120" class="box"/>
  <text x="140" y="100" text-anchor="middle" class="label">Users</text>
  <text x="140" y="125" text-anchor="middle" class="sub">Student · Vendor · Admin</text>

  <rect x="340" y="55" width="240" height="150" class="box-fe"/>
  <text x="460" y="90" text-anchor="middle" class="label">Frontend</text>
  <text x="460" y="115" text-anchor="middle" class="sub">React + Vite + Tailwind</text>
  <text x="460" y="135" text-anchor="middle" class="sub">React Query · React Router</text>

  <rect x="340" y="230" width="240" height="150" class="box"/>
  <text x="460" y="265" text-anchor="middle" class="label">Backend API</text>
  <text x="460" y="290" text-anchor="middle" class="sub">Express · JWT · Socket.io</text>
  <text x="460" y="310" text-anchor="middle" class="sub">REST /api · Rate limit</text>

  <rect x="640" y="70" width="240" height="90" class="box-ext"/>
  <text x="760" y="100" text-anchor="middle" class="label">MongoDB Atlas</text>
  <text x="760" y="125" text-anchor="middle" class="sub">Users · Shops · Orders</text>

  <rect x="640" y="180" width="115" height="70" class="box-ext"/>
  <text x="697" y="210" text-anchor="middle" class="label">Razorpay</text>
  <text x="697" y="230" text-anchor="middle" class="sub">Payments</text>

  <rect x="765" y="180" width="115" height="70" class="box-ext"/>
  <text x="822" y="210" text-anchor="middle" class="label">Cloudinary</text>
  <text x="822" y="230" text-anchor="middle" class="sub">Images</text>

  <rect x="640" y="270" width="115" height="70" class="box-ext"/>
  <text x="697" y="300" text-anchor="middle" class="label">Google OAuth</text>

  <rect x="765" y="270" width="115" height="70" class="box-ext"/>
  <text x="822" y="300" text-anchor="middle" class="label">SMTP</text>
  <text x="822" y="318" text-anchor="middle" class="sub">Email alerts</text>

  <path d="M240 130 L340 130" class="arrow"/>
  <path d="M460 205 L460 230" class="arrow"/>
  <path d="M580 280 L640 115" class="arrow"/>
  <path d="M580 300 L640 215" class="arrow"/>
  <path d="M580 310 L640 305" class="arrow"/>
  <path d="M580 320 L765 305" class="arrow"/>
  <path d="M580 330 L697 305" class="arrow"/>
</svg>
