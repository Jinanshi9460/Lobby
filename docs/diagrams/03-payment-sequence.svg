<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .actor { fill: #1e293b; stroke: #38bdf8; stroke-width: 1.5; }
      .life { stroke: #475569; stroke-width: 1; stroke-dasharray: 4 4; }
      .msg { stroke: #22d3ee; stroke-width: 1.5; fill: none; marker-end: url(#m); }
      .ret { stroke: #94a3b8; stroke-width: 1.2; fill: none; stroke-dasharray: 5 3; marker-end: url(#m2); }
      .lbl { fill: #e2e8f0; font-size: 11px; }
      .act { fill: #cbd5e1; font-size: 12px; font-weight: 600; }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#22d3ee"/></marker>
    <marker id="m2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="880" height="420" fill="#020617"/>
  <text x="440" y="28" text-anchor="middle" class="title">Order &amp; Razorpay Payment Sequence</text>

  <rect x="40" y="50" width="100" height="36" rx="6" class="actor"/><text x="90" y="73" text-anchor="middle" class="act">Student</text>
  <rect x="200" y="50" width="100" height="36" rx="6" class="actor"/><text x="250" y="73" text-anchor="middle" class="act">Frontend</text>
  <rect x="400" y="50" width="100" height="36" rx="6" class="actor"/><text x="450" y="73" text-anchor="middle" class="act">Backend</text>
  <rect x="600" y="50" width="100" height="36" rx="6" class="actor"/><text x="650" y="73" text-anchor="middle" class="act">Razorpay</text>
  <rect x="760" y="50" width="80" height="36" rx="6" class="actor"/><text x="800" y="73" text-anchor="middle" class="act">MongoDB</text>

  <line x1="90" y1="86" x2="90" y2="390" class="life"/>
  <line x1="250" y1="86" x2="250" y2="390" class="life"/>
  <line x1="450" y1="86" x2="450" y2="390" class="life"/>
  <line x1="650" y1="86" x2="650" y2="390" class="life"/>
  <line x1="800" y1="86" x2="800" y2="390" class="life"/>

  <path d="M90 110 L250 110" class="msg"/><text x="170" y="104" text-anchor="middle" class="lbl">1. Checkout</text>
  <path d="M250 135 L450 135" class="msg"/><text x="350" y="129" text-anchor="middle" class="lbl">2. POST /orders</text>
  <path d="M450 160 L800 160" class="msg"/><text x="625" y="154" text-anchor="middle" class="lbl">3. Save pending order</text>
  <path d="M450 185 L650 185" class="msg"/><text x="550" y="179" text-anchor="middle" class="lbl">4. Create payment order</text>
  <path d="M450 210 L250 210" class="ret"/><text x="350" y="204" text-anchor="middle" class="lbl">5. order_id + key</text>
  <path d="M250 235 L650 235" class="msg"/><text x="450" y="229" text-anchor="middle" class="lbl">6. Open checkout popup</text>
  <path d="M650 260 L250 260" class="ret"/><text x="450" y="254" text-anchor="middle" class="lbl">7. payment_id + signature</text>
  <path d="M250 285 L450 285" class="msg"/><text x="350" y="279" text-anchor="middle" class="lbl">8. POST /orders/verify</text>
  <path d="M450 310 L450 330" class="msg"/><text x="520" y="318" class="lbl">9. Verify signature</text>
  <path d="M450 350 L800 350" class="msg"/><text x="625" y="344" text-anchor="middle" class="lbl">10. Mark paid</text>
  <path d="M450 375 L250 375" class="ret"/><text x="350" y="369" text-anchor="middle" class="lbl">11. Success</text>
</svg>
