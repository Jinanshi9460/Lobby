<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .step { fill: #1e293b; stroke: #38bdf8; stroke-width: 1.5; }
      .t { fill: #e2e8f0; font-size: 11px; font-weight: 600; }
      .arrow { stroke: #67e8f9; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="400" height="520" fill="#020617"/>
  <text x="200" y="28" text-anchor="middle" class="title">Deployment Process Flow</text>
  <g transform="translate(50,50)">
    <rect width="300" height="40" rx="8" class="step"/><text x="150" y="26" text-anchor="middle" class="t">1. Configure production .env</text>
    <rect y="55" width="300" height="40" rx="8" class="step"/><text x="150" y="81" text-anchor="middle" class="t">2. MongoDB Atlas + IP allowlist</text>
    <rect y="110" width="300" height="40" rx="8" class="step"/><text x="150" y="136" text-anchor="middle" class="t">3. npm run build (frontend)</text>
    <rect y="165" width="300" height="40" rx="8" class="step"/><text x="150" y="191" text-anchor="middle" class="t">4. Deploy backend (Render/Railway/VPS)</text>
    <rect y="220" width="300" height="40" rx="8" class="step"/><text x="150" y="246" text-anchor="middle" class="t">5. Deploy frontend (Vercel/Netlify)</text>
    <rect y="275" width="300" height="40" rx="8" class="step"/><text x="150" y="301" text-anchor="middle" class="t">6. Set CLIENT_URL + CORS origins</text>
    <rect y="330" width="300" height="40" rx="8" class="step"/><text x="150" y="356" text-anchor="middle" class="t">7. Razorpay live keys</text>
    <rect y="385" width="300" height="40" rx="8" class="step"/><text x="150" y="411" text-anchor="middle" class="t">8. Google OAuth origins</text>
    <rect y="440" width="300" height="40" rx="8" class="step"/><text x="150" y="466" text-anchor="middle" class="t">9. SMTP + Cloudinary production</text>
    <path d="M150 90 L150 110" class="arrow"/><path d="M150 145 L150 165" class="arrow"/><path d="M150 200 L150 220" class="arrow"/>
    <path d="M150 255 L150 275" class="arrow"/><path d="M150 310 L150 330" class="arrow"/><path d="M150 365 L150 385" class="arrow"/><path d="M150 420 L150 440" class="arrow"/>
  </g>
</svg>
