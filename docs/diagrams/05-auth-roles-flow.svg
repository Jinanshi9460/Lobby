<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .hub { fill: #0e7490; stroke: #22d3ee; stroke-width: 2; }
      .role { fill: #1e293b; stroke: #38bdf8; stroke-width: 1.5; }
      .t { fill: #e2e8f0; font-size: 13px; font-weight: 600; }
      .s { fill: #94a3b8; font-size: 10px; }
      .arrow { stroke: #67e8f9; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="800" height="360" fill="#020617"/>
  <text x="400" y="28" text-anchor="middle" class="title">Authentication &amp; Role Routing</text>

  <ellipse cx="400" cy="100" rx="90" ry="36" class="hub"/><text x="400" y="105" text-anchor="middle" class="t" fill="#f0fdfa">Login</text>

  <rect x="60" y="200" width="180" height="90" rx="10" class="role"/>
  <text x="150" y="232" text-anchor="middle" class="t">Student</text>
  <text x="150" y="252" text-anchor="middle" class="s">/customer · cart · orders</text>
  <text x="150" y="268" text-anchor="middle" class="s">.edu / .ac.in email</text>

  <rect x="310" y="200" width="180" height="90" rx="10" class="role"/>
  <text x="400" y="232" text-anchor="middle" class="t">Vendor</text>
  <text x="400" y="252" text-anchor="middle" class="s">/vendor dashboard</text>
  <text x="400" y="268" text-anchor="middle" class="s">requires isApproved</text>

  <rect x="560" y="200" width="180" height="90" rx="10" class="role"/>
  <text x="650" y="232" text-anchor="middle" class="t">Admin</text>
  <text x="650" y="252" text-anchor="middle" class="s">/admin/login only</text>
  <text x="650" y="268" text-anchor="middle" class="s">no public signup</text>

  <path d="M360 125 L150 200" class="arrow"/>
  <path d="M400 136 L400 200" class="arrow"/>
  <path d="M440 125 L650 200" class="arrow"/>

  <text x="400" y="330" text-anchor="middle" fill="#94a3b8" font-size="11">Google OAuth: login mode vs register mode · JWT + refresh tokens</text>
</svg>
