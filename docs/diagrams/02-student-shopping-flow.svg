<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="Segoe UI, Inter, sans-serif">
  <defs>
    <style>
      .title { fill: #f8fafc; font-size: 18px; font-weight: 700; }
      .step { fill: #1e293b; stroke: #22d3ee; stroke-width: 1.5; }
      .t { fill: #e2e8f0; font-size: 12px; font-weight: 600; }
      .arrow { stroke: #67e8f9; stroke-width: 1.5; fill: none; marker-end: url(#a); }
    </style>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#67e8f9"/></marker>
  </defs>
  <rect width="900" height="200" fill="#020617"/>
  <text x="450" y="28" text-anchor="middle" class="title">Student Shopping Process Flow</text>
  <g transform="translate(20,50)">
    <rect width="110" height="56" rx="8" class="step"/><text x="55" y="32" text-anchor="middle" class="t">Login /</text><text x="55" y="48" text-anchor="middle" class="t">Register</text>
    <rect x="130" width="110" height="56" rx="8" class="step"/><text x="185" y="32" text-anchor="middle" class="t">Browse</text><text x="185" y="48" text-anchor="middle" class="t">Shops</text>
    <rect x="260" width="110" height="56" rx="8" class="step"/><text x="315" y="32" text-anchor="middle" class="t">View</text><text x="315" y="48" text-anchor="middle" class="t">Products</text>
    <rect x="390" width="110" height="56" rx="8" class="step"/><text x="445" y="32" text-anchor="middle" class="t">Add to</text><text x="445" y="48" text-anchor="middle" class="t">Cart</text>
    <rect x="520" width="110" height="56" rx="8" class="step"/><text x="575" y="32" text-anchor="middle" class="t">Checkout</text><text x="575" y="48" text-anchor="middle" class="t">Page</text>
    <rect x="650" width="110" height="56" rx="8" class="step"/><text x="705" y="32" text-anchor="middle" class="t">Razorpay</text><text x="705" y="48" text-anchor="middle" class="t">Payment</text>
    <rect x="780" width="100" height="56" rx="8" class="step"/><text x="830" y="32" text-anchor="middle" class="t">Order</text><text x="830" y="48" text-anchor="middle" class="t">Confirmed</text>
    <path d="M110 78 L130 78" class="arrow"/><path d="M240 78 L260 78" class="arrow"/><path d="M370 78 L390 78" class="arrow"/>
    <path d="M500 78 L520 78" class="arrow"/><path d="M630 78 L650 78" class="arrow"/><path d="M760 78 L780 78" class="arrow"/>
  </g>
  <text x="450" y="175" text-anchor="middle" fill="#94a3b8" font-size="11">Closed shops/products visible but blocked at checkout with unavailable message</text>
</svg>
